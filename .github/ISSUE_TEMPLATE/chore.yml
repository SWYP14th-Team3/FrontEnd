name: "🔧 Chore"
description: "환경설정, 리팩토링, 의존성 업데이트 등"
labels: ["chore"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "📌 개요"
      placeholder: "어떤 작업인지 간단히 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 내용"
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "📝 참고 사항"
      placeholder: "관련 문서, 레퍼런스 등 참고할 내용이 있다면 작성해주세요"
    validations:
      required: false
