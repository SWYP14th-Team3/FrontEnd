name: "🐛 버그 리포트"
description: "버그를 제보합니다"
labels: ["🐛 bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: "🐛 버그 설명"
      placeholder: "어떤 버그인지 간단히 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔄 재현 방법"
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ 기대 동작"
      placeholder: "정상적으로 동작해야 하는 모습을 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "📸 스크린샷 (선택)"
      placeholder: "버그 화면을 캡처해서 첨부해주세요"
    validations:
      required: false

  - type: dropdown
    id: browser
    attributes:
      label: "💻 브라우저"
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - 기타
    validations:
      required: false
