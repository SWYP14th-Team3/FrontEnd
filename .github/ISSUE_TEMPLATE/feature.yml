name: "✨ 기능 요청"
description: "새로운 기능을 제안합니다"
labels: ["✨ feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "📌 개요"
      placeholder: "어떤 기능인지 간단히 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 내용"
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "📝 참고 사항"
      placeholder: "디자인 시안, 관련 문서 등 참고할 내용이 있다면 작성해주세요"
    validations:
      required: false
