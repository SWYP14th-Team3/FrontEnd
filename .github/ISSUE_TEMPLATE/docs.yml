name: "📝 문서"
description: "문서 작성 및 수정"
labels: ["docs"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "📌 개요"
      placeholder: "어떤 문서를 추가/수정하는지 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 내용"
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "📝 참고 사항"
    validations:
      required: false
