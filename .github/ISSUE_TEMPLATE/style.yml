name: "💄 스타일"
description: "UI/UX 디자인, 스타일링 변경"
labels: ["style"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "📌 개요"
      placeholder: "어떤 스타일 변경인지 설명해주세요"
    validations:
      required: true

  - type: textarea
    id: design
    attributes:
      label: "🎨 디자인 시안"
      placeholder: "피그마 링크 또는 스크린샷을 첨부해주세요"
    validations:
      required: false

  - type: textarea
    id: tasks
    attributes:
      label: "✅ 작업 내용"
      value: |
        - [ ]
    validations:
      required: true
